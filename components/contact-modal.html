<div
  id="contact-modal"
  class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 px-4 py-5 opacity-0 backdrop-blur-xl transition-opacity duration-300"
  role="dialog"
  aria-modal="true"
  aria-labelledby="modal-title"
>
  <div class="absolute inset-0" data-close-contact></div>
  <section class="modal-panel relative max-h-[92vh] w-full max-w-3xl overflow-y-auto rounded-[1.5rem] border border-white/15 bg-white/[0.09] p-5 shadow-2xl backdrop-blur-2xl sm:p-7">
    <button
      class="absolute right-4 top-4 grid h-10 w-10 place-items-center rounded-full border border-white/15 bg-white/10 text-xl leading-none text-white/75 transition hover:border-gold hover:text-white"
      type="button"
      aria-label="Fechar"
      data-close-contact
    >
      ×
    </button>

    <div class="mb-6 pr-12">
      <p class="text-xs font-black uppercase tracking-[0.22em] text-gold/80">Atendimento personalizado</p>
      <h2 id="modal-title" class="mt-2 text-3xl font-black leading-tight text-white sm:text-4xl">
        Solicite seu Orçamento
      </h2>
      <p class="mt-3 max-w-2xl text-sm leading-6 text-white/62">
        Preencha as informações abaixo para iniciar seu atendimento personalizado.
      </p>
    </div>

    <form id="contact-form" class="grid gap-4 sm:grid-cols-2">
      <label class="field-label">
        <span>Nome</span>
        <input name="nome" type="text" autocomplete="name" required />
      </label>
      <label class="field-label">
        <span>Telefone</span>
        <input name="telefone" type="tel" autocomplete="tel" inputmode="tel" required />
      </label>
      <label class="field-label sm:col-span-2">
        <span>Tipo de Evento</span>
        <select name="evento" required>
          <option value="">Selecione uma opção</option>
          <option>Recepção de Convidados</option>
          <option>Sax Live com DJ</option>
          <option>Cerimonial</option>
          <option>Casamento</option>
          <option>Aniversário</option>
          <option>15 Anos</option>
          <option>Evento Corporativo</option>
          <option>Festa Particular</option>
          <option>Inauguração de Loja</option>
          <option>Evento em Restaurante</option>
          <option>Confraternização Empresarial</option>
        </select>
      </label>
      <label class="field-label sm:col-span-2">
        <span>Nome do estabelecimento/local do evento</span>
        <input name="estabelecimento" type="text" required />
      </label>
      <label class="field-label sm:col-span-2">
        <span>Endereço do evento</span>
        <input name="endereco" type="text" autocomplete="street-address" required />
      </label>
      <label class="field-label">
        <span>Data do evento</span>
        <input name="data" type="date" required />
      </label>
      <label class="field-label">
        <span>Cidade</span>
        <input name="cidade" type="text" autocomplete="address-level2" required />
      </label>
      <label class="field-label sm:col-span-2">
        <span>Quantidade aproximada de convidados</span>
        <input name="quantidade" type="number" min="1" inputmode="numeric" required />
      </label>
      <label class="field-label sm:col-span-2">
        <span>Detalhes do evento</span>
        <textarea name="detalhes" rows="4" required></textarea>
      </label>

      <button class="whatsapp-button sm:col-span-2" type="submit">
        INICIAR ATENDIMENTO NO WHATSAPP
      </button>
    </form>
  </section>
</div>
